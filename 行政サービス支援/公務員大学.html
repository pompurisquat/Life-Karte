  );
};

const SimulationBox = ({ simType, deptId, yearColor, value, onChange, styles }) => {
  if (simType === 'medical') return <MedicalSim yearColor={yearColor} value={value} onChange={onChange} styles={styles} />;
  if (simType === 'dock') return <DockSim yearColor={yearColor} styles={styles} />;

const MedicalSim = ({ yearColor, value, onChange, styles }) => {
  const total = parseFloat(value) || 0;
  const jibara = Math.round(total * 0.3);
  // 高額療養費（標準的な所得：80,100 + (総額-267,000)*0.01）
  const kogaku = total >= 267000 ? Math.round(80100 + (total - 267000) * 0.01) : jibara;
  const afterKogaku = Math.min(jibara, kogaku);
  const fukka = Math.max(0, afterKogaku - 25000);
  const finalBurden = afterKogaku - fukka;

  return (
    <div style={styles.simBox}>
      <div style={styles.simTitle}>💊 医療費シミュレーター</div>
      <div style={styles.simLabel}>月の医療費総額（病院の請求額）を入力</div>

        <input
          style={{ ...styles.simInput, flex: 1 }}
          type="number"
          placeholder="例：300000"
          value={value}
          onChange={e => onChange(e.target.value)}
        />
        <span style={{ fontSize: 14, color: '#555', flexShrink: 0 }}>円</span>
      </div>
      {total > 0 && (
        <div style={styles.simResult}>
          <div style={{ ...styles.simRow, background: '#fef2f2', color: '#991b1b' }}>
            <span>3割自己負担（通常）</span><strong>{jibara.toLocaleString()}円</strong>
          </div>
          {total >= 267000 && (
            <div style={{ ...styles.simRow, background: '#fef9c3', color: '#713f12' }}>
              <span>高額療養費適用後</span><strong>{afterKogaku.toLocaleString()}円</strong>
            </div>
          )}
          <div style={{ ...styles.simRow, background: '#f0fdf4', color: '#14532d' }}>
            <span>付加給付還付額</span><strong>−{fukka.toLocaleString()}円</strong>
          </div>
          <div style={{ ...styles.simRow, background: yearColor, color: '#fff' }}>
            <span style={{ fontWeight: 700 }}>実質自己負担額</span>
            <strong style={{ fontSize: 18 }}>{finalBurden.toLocaleString()}円</strong>
          </div>
          {finalBurden <= 25000 && total > 0 && (
            <div style={{ fontSize: 13, color: '#166534', background: '#dcfce7', padding: '10px 14px', borderRadius: 6, marginTop: 4 }}>
              ✅ 付加給付が適用され、自己負担は最大25,000円に抑えられます
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const RetirementSim = ({ deptId, yearColor, value, onChange, styles }) => {
  const years = parseInt(value) || 0;
  // Simplified formula
  const getAmount = (y) => {
    if (y <= 0) return 0;
    if (y < 10) return Math.round(y * 15 * 10000);
    if (y < 20) return Math.round((150 + (y - 10) * 50) * 10000);
    if (y < 30) return Math.round((650 + (y - 20) * 80) * 10000);
    return Math.round((1450 + (y - 30) * 100) * 10000);
  };
  const amount = getAmount(years);

  return (
    <div style={styles.simBox}>
      <div style={styles.simTitle}>💰 退職金シミュレーター（概算）</div>
      <div style={styles.simLabel}>勤続年数を入力</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
        <input
          style={{ ...styles.simInput, flex: 1 }}
          type="number"
          placeholder="例：30"
          min="1" max="45"
          value={value}
          onChange={e => onChange(e.target.value)}
        />
        <span style={{ fontSize: 14, color: '#555', flexShrink: 0 }}>年</span>
      </div>
      {years > 0 && (
        <div style={styles.simResult}>
          <div style={{ ...styles.simRow, background: yearColor, color: '#fff' }}>
            <span style={{ fontWeight: 700 }}>退職金概算（定年退職）</span>
            <strong style={{ fontSize: 18 }}>約{(amount / 10000).toLocaleString()}万円</strong>
          </div>
          <div style={{ fontSize: 12, color: '#888', marginTop: 4 }}>
            ※あくまで目安です。実際の金額は俸給月額・退職理由・自治体条例により異なります
          </div>
          {amount >= 20000000 && (
            <div style={{ fontSize: 13, color: '#166534', background: '#dcfce7', padding: '10px 14px', borderRadius: 6, marginTop: 4 }}>

        </div>
      )}

  );
};

const QuizPage = ({ deptId, onComplete, onBack }) => {
  const dept = window.DEPT_LIST.find(d => d.id === deptId);

  const [current, setCurrent] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [answers, setAnswers] = React.useState([]);
  const [showResult, setShowResult] = React.useState(false);

  const q = questions[current];
  const isLast = current === questions.length - 1;

  const handleSelect = (idx) => {
    if (selected !== null) return;
    setSelected(idx);
  };

  const handleNext = () => {
    const newAnswers = [...answers, { selected, correct: selected === q.ans }];
    setAnswers(newAnswers);
    if (isLast) {

    } else {
      setCurrent(c => c + 1);

    <div style={qpStyles.page}>
      <div style={qpStyles.header}>
        <button style={qpStyles.backBtn} onClick={onBack}>← カリキュラムへ</button>
        <div style={qpStyles.headerTitle}>4年生 — 修了クイズ</div>
      </div>
      <div style={qpStyles.body}>
        {/* Progress bar */}
        <div style={qpStyles.progress}>
          {questions.map((_, i) => (
            <div key={i} style={qpStyles.progressDot(i, current, answers)} />
          ))}
        </div>

        <div style={qpStyles.questionNum}>問 {current + 1} / {questions.length}</div>
        <div style={qpStyles.questionText}>{q.q}</div>

        {q.opts.map((opt, i) => (
          <button
            key={i}
            style={qpStyles.optionBtn(i, selected, q.ans)}
            onClick={() => handleSelect(i)}
          >
            <span style={qpStyles.optionLabel}>{labels[i]}.</span>
            {opt}
            {selected !== null && i === q.ans && <span style={{ marginLeft: 8, color: '#16a34a', fontWeight: 700 }}>✓ 正解</span>}
            {selected === i && i !== q.ans && <span style={{ marginLeft: 8, color: '#dc2626', fontWeight: 700 }}>✗</span>}
          </button>
        ))}

        {selected !== null && (
          <div style={qpStyles.explanation}>
            <strong>{selected === q.ans ? '✅ 正解！' : '❌ 不正解'}</strong>　{q.exp}
          </div>
        )}

        {selected !== null && (
          <button style={qpStyles.nextBtn} onClick={handleNext}>
            {isLast ? '結果を見る →' : '次の問題 →'}
          </button>
        )}
      </div>
    </div>
  );
};

// App.jsx — main state manager
const App = () => {
  const [page, setPage] = React.useState('top');
  const [deptId, setDeptId] = React.useState(null);
  const [currentYear, setCurrentYear] = React.useState(null);
  const [completedYears, setCompletedYears] = React.useState(new Set());

  // Persist progress
  React.useEffect(() => {
    const saved = localStorage.getItem('komuin_progress');
    if (saved) {
      try {
        const { dept, years } = JSON.parse(saved);
        if (dept) setDeptId(dept);
        if (years) setCompletedYears(new Set(years));
      } catch(e) {}
    }
  }, []);

  const saveProgress = (dept, years) => {
    localStorage.setItem('komuin_progress', JSON.stringify({ dept, years: [...years] }));
  };

  const handleEnroll = () => setPage('departments');

  const handleSelectDept = (id) => {
    setDeptId(id);
    setCompletedYears(new Set());
    setPage('curriculum');
    saveProgress(id, new Set());
  };

  const handleSelectYear = (yr) => {
    if (yr === 'certificate') {
      setPage('certificate');
    } else {
      setCurrentYear(yr);
      setPage('year');
    }
  };

  const handleCompleteYear = () => {
    const newCompleted = new Set(completedYears);
    newCompleted.add(currentYear);
    setCompletedYears(newCompleted);
    saveProgress(deptId, newCompleted);
    setPage('curriculum');
  };

  const handleQuizComplete = () => {
    const newCompleted = new Set(completedYears);
    newCompleted.add(4);
    setCompletedYears(newCompleted);
    saveProgress(deptId, newCompleted);
    setPage('certificate');
  };

  if (page === 'top') return <TopPage onEnroll={handleEnroll} />;
  if (page === 'departments') return <DepartmentSelect onSelect={handleSelectDept} onBack={() => setPage('top')} />;
  if (page === 'curriculum') return (
    <CurriculumPage
      deptId={deptId}
      completedYears={completedYears}
      onSelectYear={handleSelectYear}
      onBack={() => setPage('departments')}
    />
  );
  if (page === 'year' && currentYear !== 4) return (
    <YearDetailPage
      deptId={deptId}
      yearNum={currentYear}
      onComplete={handleCompleteYear}
      onBack={() => setPage('curriculum')}
    />
  );
  if (page === 'year' && currentYear === 4) return (
    <QuizPage
      deptId={deptId}
      onComplete={handleQuizComplete}
      onBack={() => setPage('curriculum')}
    />
  );
  if (page === 'certificate') return (
    <CertificatePage
      deptId={deptId}
      onBack={() => setPage('curriculum')}
    />
  );
  return <TopPage onEnroll={handleEnroll} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
